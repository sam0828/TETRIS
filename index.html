<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/TETRIS/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>俄羅斯方塊 - Tetris</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      h1 {
        color: white;
        font-size: 2.5rem;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }

      #game-container {
        display: flex;
        gap: 2rem;
      }

      #game-board {
        display: grid;
        grid-template-columns: repeat(10, 30px);
        grid-template-rows: repeat(20, 30px);
        gap: 1px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
        border: 3px solid white;
        border-radius: 5px;
      }

      .cell {
        width: 30px;
        height: 30px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .cell.filled {
        background: #4CAF50;
        box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3);
      }

      #stats {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        min-width: 200px;
        color: white;
        background: rgba(0, 0, 0, 0.3);
        padding: 1.5rem;
        border-radius: 5px;
      }

      .stat-item {
        display: flex;
        justify-content: space-between;
        font-size: 1.1rem;
      }

      .stat-label {
        font-weight: bold;
      }

      .stat-value {
        font-family: 'Courier New', monospace;
        font-weight: bold;
        color: #FFD700;
      }

      #controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1rem;
      }

      button {
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: white;
        color: #667eea;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #f0f0f0;
        transform: scale(1.05);
      }

      button:active {
        transform: scale(0.95);
      }

      .info {
        color: white;
        text-align: center;
        font-size: 0.9rem;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>俄羅斯方塊</h1>
      <div id="game-container">
        <div id="game-board"></div>
        <div id="stats">
          <div class="stat-item">
            <span class="stat-label">分數:</span>
            <span class="stat-value" id="score">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">消除:</span>
            <span class="stat-value" id="lines">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">等級:</span>
            <span class="stat-value" id="level">1</span>
          </div>
          <div id="controls">
            <button id="start-btn">開始</button>
            <button id="pause-btn">暫停</button>
          </div>
        </div>
      </div>
      <div class="info">
        ⬅️ ➡️ ⬇️ 移動 | ⬆️ 旋轉 | 空格 快速下落
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
